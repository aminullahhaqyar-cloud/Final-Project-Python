{% extends "base.html" %}
{% block title %}Edit {{ member.name }} · LibraryMS{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Edit Member: {{ member.name }}</h1>
  <form method="POST" class="card-form">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" value="{{ member.name }}" required />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ member.email }}" required />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role">
          <option value="member" {% if member.role == 'member' %}selected{% endif %}>Member</option>
          <option value="librarian" {% if member.role == 'librarian' %}selected{% endif %}>Librarian</option>
          <option value="admin" {% if member.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>
      <div class="form-group" style="margin-top:2rem;">
        <label class="checkbox-label">
          <input type="checkbox" name="is_active" {% if member.is_active %}checked{% endif %}> Account Active
        </label>
      </div>
    </div>
    <div class="form-group">
      <label for="new_password">New Password (leave blank to keep unchanged)</label>
      <input type="password" id="new_password" name="new_password" minlength="6" />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Save Changes</button>
      <a href="{{ url_for('user_detail', user_id=member.id) }}" class="btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
