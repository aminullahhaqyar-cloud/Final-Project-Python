{% extends "base.html" %}
{% block title %}Register · LibraryMS{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p>Join our library community today.</p>
    <form method="POST" class="card-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required autofocus />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required />
        </div>
      </div>
      <button type="submit" class="btn-primary full-width">Register</button>
    </form>
    <p class="auth-switch">Already a member? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
